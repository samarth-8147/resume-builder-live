<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Responsive Resume Builder</title>

<link rel="stylesheet" href="css/style.css">

   <!-- Font Awesome -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

   <!-- FORM SECTION -->
   <div class="form">

      <h2>Responsive Resume Builder</h2>

      <div class="box">
         <label>Name</label>
         <input type="text" id="name" placeholder="Enter your name">
      </div>

      <div class="box">
         <label>Phone</label>
         <input type="text" id="phone" placeholder="+91-XXXXXXXXXX">
      </div>

      <div class="box">
         <label>Email</label>
         <input type="email" id="email" placeholder="example@gmail.com">
      </div>

      <div class="box">
         <label>Address</label>
         <input type="text" id="address" placeholder="City, State">
      </div>

      <div class="box">
         <label>Profile Photo</label>
         <input type="file" id="photo" accept="image/*">
      </div>

      <div class="box">
         <label>Objective</label>
         <textarea id="objective" rows="3"></textarea>
      </div>

      <div class="box">
         <label>Education</label>
         <textarea id="education" rows="3"></textarea>
      </div>

      <div class="box">
         <label>Skills (max 5)</label>
         <input type="text" id="skill-input" placeholder="Add skill">
         <button id="add-skill">Add</button>
         <ul id="skill-list"></ul>
      </div>

      <div class="box">
         <label>Experience</label>
         <textarea id="experience" rows="3"></textarea>
      </div>

      <div class="box">
         <label>Languages</label>
         <input type="text" id="languages" placeholder="English, Hindi">
      </div>

      <div class="box">
         <label>Projects (max 5)</label>
         <input type="text" id="project-input" placeholder="Add project">
         <button id="add-project">Add</button>
         <ul id="project-list"></ul>
      </div>

      <button id="downloadPdf" class="download-btn">Download PDF</button>

   </div>

   <!-- PREVIEW SECTION -->
   <div id="resume" class="preview">

      <div class="header">
         <div>
            <h2 id="preview-name">Your Name</h2>
            <p><i class="fas fa-phone"></i> <span id="preview-phone">Phone</span></p>
            <p><i class="fas fa-envelope"></i> <span id="preview-email">Email</span></p>
            <p><i class="fas fa-map-marker-alt"></i> <span id="preview-address">Address</span></p>
         </div>
         <div id="preview-photo" class="photo">Photo</div>
      </div>

      <div class="section">
         <h3>Objective</h3>
         <p id="preview-objective"></p>
      </div>

      <div class="section">
         <h3>Education</h3>
         <p id="preview-education"></p>
      </div>

      <div class="section">
         <h3>Skills</h3>
         <ul id="preview-skills"></ul>
      </div>

      <div class="section">
         <h3>Experience</h3>
         <p id="preview-experience"></p>
      </div>

      <div class="section">
         <h3>Languages</h3>
         <p id="preview-languages"></p>
      </div>

      <div class="section">
         <h3>Projects</h3>
         <ul id="preview-projects"></ul>
      </div>

   </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.12.1/html2pdf.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
